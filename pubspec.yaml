name: stylecart
description: Luxr — AI Powered Clothing Store
publish_to: 'none'

# Version: major.minor.patch+buildNumber
# Increment buildNumber for every Play Store upload
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase Core ─────────────────────────────────
  firebase_core:            ^3.6.0
  firebase_auth:            ^5.3.1
  cloud_firestore:          ^5.4.4
  firebase_storage:         ^12.3.3
  firebase_messaging:       ^15.1.3
  firebase_analytics:       ^11.3.3
  firebase_crashlytics:     ^4.1.3
  firebase_performance:     ^0.10.0+8

  # ── State Management ──────────────────────────────
  flutter_riverpod:         ^2.5.1
  riverpod_annotation:      ^2.3.5

  # ── Navigation ────────────────────────────────────
  go_router:                ^14.2.7

  # ── Utilities ─────────────────────────────────────
  flutter_dotenv:           ^5.1.0
  equatable:                ^2.0.5
  dartz:                    ^0.10.1
  freezed_annotation:       ^2.4.4
  json_annotation:          ^4.9.0
  uuid:                     ^4.4.2
  intl:                     ^0.19.0

  # ── Storage ───────────────────────────────────────
  shared_preferences:       ^2.3.2
  flutter_secure_storage:   ^9.2.2

  # ── UI Components ─────────────────────────────────
  cached_network_image:     ^3.4.1
  flutter_svg:              ^2.0.10+1
  shimmer:                  ^3.0.0
  gap:                      ^3.0.1

  # ── Media ─────────────────────────────────────────
  image_picker:             ^1.1.2

  # ── Notifications ─────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── PDF & Export ──────────────────────────────────
  pdf:                      ^3.11.1
  printing:                 ^5.13.1
  share_plus:               ^10.0.2
  path_provider:            ^2.1.4

  # ── Google Sign In ────────────────────────────────
  google_sign_in:           ^6.2.1

  # ── App Settings ──────────────────────────────────
  app_settings:             ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:            ^4.0.0
  build_runner:             ^2.4.12
  riverpod_generator:       ^2.4.3
  freezed:                  ^2.5.7
  json_serializable:        ^6.8.0
  very_good_analysis:       ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - .env

